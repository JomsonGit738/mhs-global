name: Deploy to IONOS

on:
  push:
    branches:
      - production

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      # Clean target folder using SFTP-only (IONOS blocks shell access)
      - name: Clean remote folder over SFTP
        env:
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_PORT: ${{ secrets.FTP_PORT }}
        run: |
          set -e
          cat <<'EOF' > sftp-clean.cmd
          mkdir mhsglobalassociatescom
          cd mhsglobalassociatescom
          rm -r *
          EOF
          # Ignore non-zero exit if the folder is already empty
          sshpass -p "$FTP_PASSWORD" sftp -o StrictHostKeyChecking=no -P "$FTP_PORT" "$FTP_USERNAME@$FTP_SERVER" < sftp-clean.cmd || true

      # Upload the build folder to IONOS via SFTP + password (pure SFTP, no SSH)
      - name: Deploy to IONOS over SFTP
        uses: wlixcc/SFTP-Deploy-Action@v1.2.6
        with:
          username: ${{ secrets.FTP_USERNAME }} # su482289
          server: ${{ secrets.FTP_SERVER }} # access-...webspace-host.com
          port: ${{ secrets.FTP_PORT }} # 22
          password: ${{ secrets.FTP_PASSWORD }} # your IONOS password
          local_path: "./build/*"
          remote_path: "./mhsglobalassociatescom" # where it lives on IONOS
          sftp_only: true # avoid SSH because the host allows SFTP only
          delete_remote_files: false # cleaned via SFTP above; avoid SSH-only delete

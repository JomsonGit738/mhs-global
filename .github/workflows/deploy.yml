name: Deploy to IONOS

on:
  push:
    branches:
      - production

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y sshpass

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Verify build output
        run: |
          test -f build/index.html
          test -d build/static
          ls -la build
          find build -maxdepth 3 -type f

      - name: Remove and recreate remote folder over SFTP
        env:
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_PORT: ${{ secrets.FTP_PORT }}
        run: |
          set -e

          cat > sftp-clean.cmd <<'EOF'
          -rm -r mhsglobalassociatescom
          mkdir mhsglobalassociatescom
          EOF

          sshpass -p "$FTP_PASSWORD" sftp \
            -o StrictHostKeyChecking=no \
            -P "$FTP_PORT" \
            "$FTP_USERNAME@$FTP_SERVER" < sftp-clean.cmd

      - name: Deploy to IONOS over SFTP
        uses: wlixcc/SFTP-Deploy-Action@v1.2.6
        with:
          username: ${{ secrets.FTP_USERNAME }}
          server: ${{ secrets.FTP_SERVER }}
          port: ${{ secrets.FTP_PORT }}
          password: ${{ secrets.FTP_PASSWORD }}
          local_path: "./build/"
          remote_path: "./mhsglobalassociatescom/"
          sftp_only: true
          delete_remote_files: false

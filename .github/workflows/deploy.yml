name: Deploy to IONOS

on:
  push:
    branches:
      - production

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Verify build output
        run: |
          test -f build/index.html
          test -d build/static
          ls -la build
          find build -maxdepth 3 -type f

      - name: Deploy build to IONOS over SFTP
        env:
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_PORT: ${{ secrets.FTP_PORT }}
        run: |
          set -e

          lftp -u "$FTP_USERNAME","$FTP_PASSWORD" -p "$FTP_PORT" sftp://"$FTP_SERVER" <<EOF
          set sftp:auto-confirm yes
          set ssl:verify-certificate no
 
          mkdir -p /mhsglobalassociatescom/static

          # Upload hashed static assets first so all chunks/media exist before index.html changes.
          mirror \
            --reverse \
            --verbose \
            ./build/static/ \
            /mhsglobalassociatescom/static/

          # Upload non-static root files next, but keep index.html for last to avoid mixed deployments.
          mirror \
            --reverse \
            --verbose \
            --exclude-glob static \
            --exclude-glob index.html \
            ./build/ \
            /mhsglobalassociatescom/

          put ./build/index.html -o /mhsglobalassociatescom/index.html

          bye
          EOF
